<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spore Lord</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Lora:ital,wght@1,400;1,500&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./style.css">

</head>
<body>
  <header>
    <h1>SPORE LORD</h1>
    <div class="spore-counter">
      <span>🍄 <span id="spore-count">0</span> Spores</span>
      <span class="sps"><span id="sps-display">0</span> / sec</span>
    </div>
    <button class="sound-toggle" id="sound-toggle" type="button" aria-label="Mute sound">🔊</button>
  </header>

  <main>
    <section class="col col-left">
      <h2>Generators</h2>
      <div id="generators"></div>
    </section>

    <section class="col col-center">
      <div class="click-area" id="click-area">
        <div class="glow-ring"></div>
        <svg class="mushroom" id="mushroom" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <defs>
            <radialGradient id="cap-grad" cx="50%" cy="35%" r="65%">
              <stop offset="0%"  stop-color="#d4ffa8"/>
              <stop offset="55%" stop-color="#a8ff78"/>
              <stop offset="100%" stop-color="#3d6b22"/>
            </radialGradient>
            <linearGradient id="stem-grad" x1="0%" y1="0%" x2="0%" y2="100%">
              <stop offset="0%"   stop-color="#e8eaf2"/>
              <stop offset="100%" stop-color="#6b7280"/>
            </linearGradient>
            <radialGradient id="under-glow" cx="50%" cy="60%" r="55%">
              <stop offset="0%"   stop-color="#a8ff78" stop-opacity="0.45"/>
              <stop offset="100%" stop-color="#a8ff78" stop-opacity="0"/>
            </radialGradient>
          </defs>
          <g class="mushroom-roots">
            <path d="M 84 173 C 68 184 45 184 28 194"/>
            <path d="M 101 176 C 95 192 92 198 82 206"/>
            <path d="M 116 173 C 135 184 154 184 174 195"/>
            <path d="M 94 177 C 78 191 62 197 42 203"/>
            <path d="M 108 177 C 126 192 142 198 164 203"/>
          </g>
          <ellipse class="mushroom-under-glow" cx="100" cy="120" rx="92" ry="74" fill="url(#under-glow)"/>
          <path class="mushroom-stem" d="M 100 178 L 72 178 L 68 112 L 132 112 L 128 178 Z" fill="url(#stem-grad)"/>
          <g class="mushroom-gills">
            <path d="M 48 116 C 67 128 82 132 100 132 C 118 132 133 128 152 116"/>
            <path d="M 60 121 C 74 137 87 144 100 144 C 113 144 126 137 140 121"/>
            <path d="M 78 122 C 84 143 91 154 100 158 C 109 154 116 143 122 122"/>
          </g>
          <path class="mushroom-cap" d="M 22 110 Q 22 32 100 28 Q 178 32 178 110 Q 178 122 166 122 L 34 122 Q 22 122 22 110 Z" fill="url(#cap-grad)"/>
          <g class="mushroom-spots">
            <ellipse cx="72" cy="62" rx="10" ry="6" fill="#e0ffc8" opacity="0.55"/>
            <ellipse cx="118" cy="48" rx="7"  ry="4" fill="#e0ffc8" opacity="0.55"/>
            <ellipse cx="146" cy="78" rx="6"  ry="4" fill="#e0ffc8" opacity="0.55"/>
            <ellipse cx="50"  cy="90" rx="5"  ry="3" fill="#e0ffc8" opacity="0.4"/>
          </g>
          <g class="mushroom-veins">
            <path d="M 100 34 C 92 55 85 70 70 91"/>
            <path d="M 101 35 C 111 55 120 71 139 94"/>
            <path d="M 55 95 C 76 87 92 86 115 92"/>
            <path d="M 126 60 C 133 72 146 86 162 98"/>
          </g>
          <g class="mushroom-nodules">
            <circle cx="62" cy="80" r="4"/>
            <circle cx="93" cy="55" r="3.5"/>
            <circle cx="135" cy="67" r="4.5"/>
            <circle cx="113" cy="102" r="3.5"/>
          </g>
          <g class="mushroom-ember">
            <path d="M 80 46 L 86 66 L 78 82 L 90 102"/>
            <path d="M 119 40 L 113 61 L 127 82 L 118 111"/>
            <path d="M 53 82 L 71 91 L 83 115"/>
          </g>
          <g class="mushroom-cosmic">
            <ellipse cx="100" cy="92" rx="74" ry="22"/>
            <ellipse cx="100" cy="92" rx="54" ry="72"/>
            <circle cx="151" cy="91" r="3.5"/>
            <circle cx="70" cy="45" r="2.5"/>
          </g>
          <g class="mushroom-crown">
            <path d="M 62 119 C 56 101 60 88 75 78 C 83 94 82 107 72 122"/>
            <path d="M 138 119 C 144 101 140 88 125 78 C 117 94 118 107 128 122"/>
            <path d="M 94 121 C 88 98 92 77 100 61 C 108 77 112 98 106 121"/>
          </g>
        </svg>
        <div class="particle-layer" id="particle-layer"></div>
        <div class="float-layer" id="float-layer"></div>
      </div>
      <div class="spc-display">Each spore released: <strong id="spc-display">1</strong></div>
    </section>

    <section class="col col-right">
      <h2>Upgrade Trees</h2>
      <div class="tree-tabs" id="tree-tabs"></div>
      <div class="tree-panel" id="tree-panel"></div>
    </section>
  </main>

  <footer class="event-log" id="event-log"></footer>

  <div id="toast-container"></div>

<script type="module" src="./src/main.js"></script>

</body>
</html>
